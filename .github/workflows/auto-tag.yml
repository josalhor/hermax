name: Auto Tag from setup.py

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(grep -oP "(?<=version=['\"])[^'\"]*" setup.py)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not find version in setup.py"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Force Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG_NAME="v${{ env.VERSION }}"
          
          # Create (or recreate) the tag locally on the current commit
          git tag -f "$TAG_NAME"
          
          # Force push the tag to the remote repository
          # This 'moves' the tag from an old commit to the current one
          git push origin "$TAG_NAME" --force