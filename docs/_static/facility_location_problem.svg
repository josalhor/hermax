<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-label="Facility location problem instance">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --line: rgba(74, 64, 54, 0.22);
      --north: #146356;
      --south: #b85c38;
      --client: #4b6cb7;
      --card: rgba(244, 239, 232, 0.82);
      --card-stroke: rgba(74, 64, 54, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --line: rgba(255, 255, 255, 0.16);
        --north: #4fd2b5;
        --south: #ef8d6f;
        --client: #8aa8ff;
        --card: rgba(36, 35, 33, 0.88);
        --card-stroke: rgba(255, 255, 255, 0.12);
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .box {
      fill: var(--card);
      stroke: var(--card-stroke);
      stroke-width: 1.5;
      rx: 18;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
    }

    .small {
      font-size: 13px;
      font-weight: 600;
      fill: var(--muted);
    }

    .cost {
      font-size: 13px;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
    }

    .link {
      stroke: var(--line);
      stroke-width: 3;
      fill: none;
    }

    .north { fill: var(--north); }
    .south { fill: var(--south); }
    .client { fill: var(--client); }

    .dotlabel {
      font-size: 15px;
      font-weight: 700;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <text class="meta" x="40" y="28">
    Facility location instance
    <tspan class="secondary"> · choose facilities to open and assign every client</tspan>
  </text>

  <rect class="box" x="34" y="56" width="692" height="274" />

  <circle class="north" cx="365" cy="128" r="28" />
  <text class="dotlabel" x="365" y="129">N</text>
  <text class="label" x="365" y="172" text-anchor="middle">north</text>
  <text class="small" x="365" y="192" text-anchor="middle">fixed cost 4 · cap 3</text>

  <circle class="south" cx="365" cy="248" r="28" />
  <text class="dotlabel" x="365" y="249">S</text>
  <text class="label" x="365" y="292" text-anchor="middle">south</text>
  <text class="small" x="365" y="312" text-anchor="middle">fixed cost 6 · cap 3</text>

  <circle class="client" cx="150" cy="250" r="24" />
  <text class="dotlabel" x="150" y="251">A</text>

  <circle class="client" cx="150" cy="170" r="24" />
  <text class="dotlabel" x="150" y="171">C</text>

  <circle class="client" cx="580" cy="250" r="24" />
  <text class="dotlabel" x="580" y="251">B</text>

  <line class="link" x1="174" y1="244" x2="337" y2="135" />
  <text class="cost" x="256" y="182">1</text>
  <line class="link" x1="171" y1="177" x2="337" y2="134" />
  <text class="cost" x="252" y="151">2</text>
  <line class="link" x1="556" y1="244" x2="393" y2="135" />
  <text class="cost" x="475" y="182">3</text>

  <line class="link" x1="174" y1="250" x2="337" y2="241" />
  <text class="cost" x="254" y="244">4</text>
  <line class="link" x1="172" y1="177" x2="338" y2="242" />
  <text class="cost" x="254" y="222">2</text>
  <line class="link" x1="556" y1="250" x2="393" y2="242" />
  <text class="cost" x="474" y="242">1</text>
</svg>
