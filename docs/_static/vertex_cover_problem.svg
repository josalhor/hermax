<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" role="img" aria-label="Vertex cover problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --edge: rgba(74, 64, 54, 0.42);
      --node-fill: rgba(244, 239, 232, 0.88);
      --node-stroke: rgba(74, 64, 54, 0.28);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --edge: rgba(255, 255, 255, 0.28);
        --node-fill: rgba(36, 35, 33, 0.92);
        --node-stroke: rgba(255, 255, 255, 0.18);
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .edge {
      stroke: var(--edge);
      stroke-width: 4;
      fill: none;
    }

    .node {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 2;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .cost {
      font-size: 12px;
      fill: var(--muted);
      text-anchor: middle;
    }
  </style>

  <text class="meta" x="40" y="28">
    Vertex cover instance
    <tspan class="secondary"> · cover every edge with at least one selected endpoint</tspan>
  </text>

  <line class="edge" x1="150" y1="120" x2="290" y2="85" />
  <line class="edge" x1="290" y1="85" x2="430" y2="120" />
  <line class="edge" x1="430" y1="120" x2="520" y2="235" />
  <line class="edge" x1="520" y1="235" x2="240" y2="265" />
  <line class="edge" x1="150" y1="120" x2="240" y2="265" />

  <circle class="node" cx="150" cy="120" r="28" />
  <text class="label" x="150" y="121">0</text>
  <text class="cost" x="150" y="158">cost 2</text>

  <circle class="node" cx="290" cy="85" r="28" />
  <text class="label" x="290" y="86">1</text>
  <text class="cost" x="290" y="123">cost 1</text>

  <circle class="node" cx="430" cy="120" r="28" />
  <text class="label" x="430" y="121">2</text>
  <text class="cost" x="430" y="158">cost 2</text>

  <circle class="node" cx="520" cy="235" r="28" />
  <text class="label" x="520" y="236">3</text>
  <text class="cost" x="520" y="273">cost 1</text>

  <circle class="node" cx="240" cy="265" r="28" />
  <text class="label" x="240" y="266">4</text>
  <text class="cost" x="240" y="303">cost 2</text>
</svg>
