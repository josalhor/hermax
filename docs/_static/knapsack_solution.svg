<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" role="img" aria-label="Knapsack solution">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --stroke: rgba(74, 64, 54, 0.22);
      --panel: rgba(244, 239, 232, 0.82);
      --chosen: rgba(20, 99, 86, 0.16);
      --chosen-stroke: #146356;
      --faded: rgba(127, 109, 88, 0.18);
      --totals: rgba(200, 76, 9, 0.12);
      --totals-stroke: #c84c09;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --stroke: rgba(255, 255, 255, 0.16);
        --panel: rgba(36, 35, 33, 0.88);
        --chosen: rgba(79, 210, 181, 0.18);
        --chosen-stroke: #4fd2b5;
        --faded: rgba(255, 255, 255, 0.08);
        --totals: rgba(255, 156, 91, 0.16);
        --totals-stroke: #ff9c5b;
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .item {
      fill: var(--panel);
      stroke: var(--stroke);
      stroke-width: 1.4;
      rx: 16;
    }

    .chosen {
      fill: var(--chosen);
      stroke: var(--chosen-stroke);
      stroke-width: 1.8;
    }

    .faded {
      opacity: 0.58;
      fill: var(--faded);
    }

    .item-label {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
    }

    .item-meta {
      font-size: 13px;
      fill: var(--muted);
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      fill: var(--chosen-stroke);
    }

    .totals {
      fill: var(--totals);
      stroke: var(--totals-stroke);
      stroke-width: 1.5;
      rx: 16;
    }

    .totals-title {
      font-size: 15px;
      font-weight: 700;
      fill: var(--totals-stroke);
    }

    .totals-text {
      font-size: 13px;
      fill: var(--ink);
    }
  </style>

  <text class="meta" x="40" y="28">
    Solved knapsack
    <tspan class="secondary"> · chosen items [1, 3] · total weight 8 · total profit 18</tspan>
  </text>

  <rect class="item faded" x="40" y="58" width="150" height="120" />
  <text class="item-label" x="58" y="90">Item 0</text>
  <text class="item-meta" x="58" y="118">weight 2</text>
  <text class="item-meta" x="58" y="142">profit 6</text>

  <rect class="item chosen" x="210" y="58" width="150" height="120" />
  <text class="item-label" x="228" y="90">Item 1</text>
  <text class="item-meta" x="228" y="118">weight 3</text>
  <text class="item-meta" x="228" y="142">profit 8</text>
  <text class="badge" x="228" y="166">selected</text>

  <rect class="item faded" x="380" y="58" width="150" height="120" />
  <text class="item-label" x="398" y="90">Item 2</text>
  <text class="item-meta" x="398" y="118">weight 4</text>
  <text class="item-meta" x="398" y="142">profit 9</text>

  <rect class="item chosen" x="550" y="58" width="150" height="120" />
  <text class="item-label" x="568" y="90">Item 3</text>
  <text class="item-meta" x="568" y="118">weight 5</text>
  <text class="item-meta" x="568" y="142">profit 10</text>
  <text class="badge" x="568" y="166">selected</text>

  <rect class="totals" x="40" y="200" width="660" height="46" />
  <text class="totals-title" x="58" y="220">Totals</text>
  <text class="totals-text" x="125" y="220">3 + 5 = 8 weight, 8 + 10 = 18 profit</text>
</svg>
