<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-label="CVRP problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --grid: rgba(74, 64, 54, 0.14);
      --depot: #202020;
      --customer: #f2efe8;
      --customer-stroke: #303030;
      --halo: rgba(255, 252, 244, 0.88);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --grid: rgba(255, 255, 255, 0.10);
        --depot: #f4efe6;
        --customer: #242321;
        --customer-stroke: #f4efe6;
        --halo: rgba(24, 24, 24, 0.9);
      }
    }

    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .node text {
      font: 700 13px "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: var(--ink);
    }

    .node circle {
      stroke-width: 2;
    }

    .node.depot circle {
      fill: var(--depot);
      stroke: var(--depot);
    }

    .node.depot text {
      fill: var(--halo);
    }

    .node.customer circle {
      fill: var(--customer);
      stroke: var(--customer-stroke);
    }

    .demand,
    .meta {
      font: 11px "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      fill: var(--muted);
      text-anchor: middle;
    }

    .meta {
      text-anchor: start;
      font-size: 13px;
      fill: var(--ink);
      font-weight: 600;
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }
  </style>

  <g>
    <line class="grid-line" x1="172.857" y1="56" x2="172.857" y2="390" />
    <line class="grid-line" x1="255.714" y1="56" x2="255.714" y2="390" />
    <line class="grid-line" x1="338.571" y1="56" x2="338.571" y2="390" />
    <line class="grid-line" x1="421.429" y1="56" x2="421.429" y2="390" />
    <line class="grid-line" x1="504.286" y1="56" x2="504.286" y2="390" />
    <line class="grid-line" x1="587.143" y1="56" x2="587.143" y2="390" />

    <line class="grid-line" x1="40" y1="137.5" x2="720" y2="137.5" />
    <line class="grid-line" x1="40" y1="215" x2="720" y2="215" />
    <line class="grid-line" x1="40" y1="292.5" x2="720" y2="292.5" />

    <text class="meta" x="40" y="28">
      CVRP instance
      <tspan class="secondary"> · depot 0 · customers 1..4 · capacity 10 · vehicles 2</tspan>
    </text>
  </g>

  <g class="node depot">
    <circle cx="90" cy="348" r="18" />
    <text x="90" y="349">0</text>
  </g>

  <g class="node customer">
    <circle cx="255.714" cy="159.333" r="20" />
    <text x="255.714" y="160.333">1</text>
    <text class="demand" x="255.714" y="192.333">demand 4</text>
  </g>

  <g class="node customer">
    <circle cx="504.286" cy="253.667" r="20" />
    <text x="504.286" y="254.667">2</text>
    <text class="demand" x="504.286" y="286.667">demand 5</text>
  </g>

  <g class="node customer">
    <circle cx="670" cy="65" r="20" />
    <text x="670" y="66">3</text>
    <text class="demand" x="670" y="98">demand 3</text>
  </g>

  <g class="node customer">
    <circle cx="172.857" cy="112.167" r="20" />
    <text x="172.857" y="113.167">4</text>
    <text class="demand" x="172.857" y="145.167">demand 5</text>
  </g>
</svg>
