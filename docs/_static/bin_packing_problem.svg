<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Bin packing problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --stroke: rgba(74, 64, 54, 0.22);
      --panel: rgba(244, 239, 232, 0.82);
      --item: rgba(20, 99, 86, 0.14);
      --item-stroke: #146356;
      --bin: rgba(200, 76, 9, 0.08);
      --bin-stroke: #c84c09;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --stroke: rgba(255, 255, 255, 0.16);
        --panel: rgba(36, 35, 33, 0.88);
        --item: rgba(79, 210, 181, 0.18);
        --item-stroke: #4fd2b5;
        --bin: rgba(255, 156, 91, 0.14);
        --bin-stroke: #ff9c5b;
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .card {
      fill: var(--panel);
      stroke: var(--stroke);
      stroke-width: 1.4;
      rx: 16;
    }

    .item {
      fill: var(--item);
      stroke: var(--item-stroke);
      stroke-width: 1.3;
      rx: 12;
    }

    .label {
      font-size: 13px;
      fill: var(--ink);
      font-weight: 600;
      text-anchor: middle;
    }

    .bin {
      fill: var(--bin);
      stroke: var(--bin-stroke);
      stroke-width: 1.4;
      rx: 16;
    }

    .bintext {
      font-size: 13px;
      fill: var(--ink);
      font-weight: 600;
      text-anchor: middle;
    }
  </style>

  <text class="meta" x="40" y="28">
    Bin packing instance
    <tspan class="secondary"> · item sizes [4, 8, 1, 4, 2, 1] · identical bins of capacity 10</tspan>
  </text>

  <rect class="card" x="40" y="58" width="680" height="220" />

  <rect class="item" x="70" y="90" width="96" height="42" />
  <text class="label" x="118" y="115">item 0 · size 4</text>
  <rect class="item" x="184" y="90" width="138" height="42" />
  <text class="label" x="253" y="115">item 1 · size 8</text>
  <rect class="item" x="340" y="90" width="72" height="42" />
  <text class="label" x="376" y="115">item 2 · 1</text>
  <rect class="item" x="430" y="90" width="96" height="42" />
  <text class="label" x="478" y="115">item 3 · 4</text>
  <rect class="item" x="544" y="90" width="78" height="42" />
  <text class="label" x="583" y="115">item 4 · 2</text>
  <rect class="item" x="640" y="90" width="50" height="42" />
  <text class="label" x="665" y="115">5 · 1</text>

  <rect class="bin" x="110" y="176" width="140" height="70" />
  <text class="bintext" x="180" y="212">bin capacity 10</text>

  <rect class="bin" x="310" y="176" width="140" height="70" />
  <text class="bintext" x="380" y="212">bin capacity 10</text>

  <rect class="bin" x="510" y="176" width="140" height="70" />
  <text class="bintext" x="580" y="212">more bins available</text>
</svg>
