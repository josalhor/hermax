<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img" aria-label="Job shop scheduling solution">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --grid: rgba(74, 64, 54, 0.18);
      --panel: rgba(244, 239, 232, 0.82);
      --j1: rgba(20, 99, 86, 0.16);
      --j1s: #146356;
      --j2: rgba(200, 76, 9, 0.14);
      --j2s: #c84c09;
      --j3: rgba(54, 89, 160, 0.14);
      --j3s: #3659a0;
      --makespan: rgba(200, 76, 9, 0.12);
      --makespan-s: #c84c09;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --grid: rgba(255, 255, 255, 0.12);
        --panel: rgba(36, 35, 33, 0.88);
        --j1: rgba(79, 210, 181, 0.18);
        --j1s: #4fd2b5;
        --j2: rgba(255, 156, 91, 0.18);
        --j2s: #ff9c5b;
        --j3: rgba(125, 160, 255, 0.18);
        --j3s: #7da0ff;
        --makespan: rgba(255, 156, 91, 0.16);
        --makespan-s: #ff9c5b;
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .machine {
      font-size: 15px;
      font-weight: 700;
      fill: var(--ink);
    }

    .grid {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .tick {
      font-size: 11px;
      fill: var(--muted);
      text-anchor: middle;
    }

    .bar {
      stroke-width: 1.4;
      rx: 10;
    }

    .label {
      font-size: 12px;
      fill: var(--ink);
      font-weight: 600;
      text-anchor: middle;
    }

    .j1 { fill: var(--j1); stroke: var(--j1s); }
    .j2 { fill: var(--j2); stroke: var(--j2s); }
    .j3 { fill: var(--j3); stroke: var(--j3s); }

    .makespan {
      fill: var(--makespan);
      stroke: var(--makespan-s);
      stroke-width: 1.5;
      rx: 16;
    }

    .ms-title {
      font-size: 15px;
      font-weight: 700;
      fill: var(--makespan-s);
    }

    .ms-text {
      font-size: 13px;
      fill: var(--ink);
    }
  </style>

  <text class="meta" x="40" y="28">
    Solved schedule
    <tspan class="secondary"> · makespan 11 · bars are positioned on their machine timelines</tspan>
  </text>

  <line class="grid" x1="120" y1="78" x2="670" y2="78" />
  <line class="grid" x1="120" y1="138" x2="670" y2="138" />
  <line class="grid" x1="120" y1="198" x2="670" y2="198" />
  <line class="grid" x1="120" y1="258" x2="670" y2="258" />

  <line class="grid" x1="120" y1="78" x2="120" y2="258" />
  <line class="grid" x1="170" y1="78" x2="170" y2="258" />
  <line class="grid" x1="220" y1="78" x2="220" y2="258" />
  <line class="grid" x1="270" y1="78" x2="270" y2="258" />
  <line class="grid" x1="320" y1="78" x2="320" y2="258" />
  <line class="grid" x1="370" y1="78" x2="370" y2="258" />
  <line class="grid" x1="420" y1="78" x2="420" y2="258" />
  <line class="grid" x1="470" y1="78" x2="470" y2="258" />
  <line class="grid" x1="520" y1="78" x2="520" y2="258" />
  <line class="grid" x1="570" y1="78" x2="570" y2="258" />
  <line class="grid" x1="620" y1="78" x2="620" y2="258" />
  <line class="grid" x1="670" y1="78" x2="670" y2="258" />

  <text class="tick" x="120" y="70">0</text>
  <text class="tick" x="170" y="70">1</text>
  <text class="tick" x="220" y="70">2</text>
  <text class="tick" x="270" y="70">3</text>
  <text class="tick" x="320" y="70">4</text>
  <text class="tick" x="370" y="70">5</text>
  <text class="tick" x="420" y="70">6</text>
  <text class="tick" x="470" y="70">7</text>
  <text class="tick" x="520" y="70">8</text>
  <text class="tick" x="570" y="70">9</text>
  <text class="tick" x="620" y="70">10</text>
  <text class="tick" x="670" y="70">11</text>

  <text class="machine" x="60" y="113">M1</text>
  <text class="machine" x="60" y="173">M2</text>
  <text class="machine" x="60" y="233">M3</text>

  <rect class="bar j1" x="120" y="92" width="150" height="24" />
  <text class="label" x="195" y="108">J1-1</text>
  <rect class="bar j2" x="270" y="92" width="200" height="24" />
  <text class="label" x="370" y="108">J2-3</text>
  <rect class="bar j3" x="470" y="92" width="150" height="24" />
  <text class="label" x="545" y="108">J3-2</text>

  <rect class="bar j2" x="120" y="152" width="100" height="24" />
  <text class="label" x="170" y="168">J2-1</text>
  <rect class="bar j1" x="270" y="152" width="100" height="24" />
  <text class="label" x="320" y="168">J1-2</text>
  <rect class="bar j3" x="620" y="152" width="50" height="24" />
  <text class="label" x="645" y="168">J3-3</text>

  <rect class="bar j2" x="220" y="212" width="50" height="24" />
  <text class="label" x="245" y="228">J2-2</text>
  <rect class="bar j3" x="270" y="212" width="200" height="24" />
  <text class="label" x="370" y="228">J3-1</text>
  <rect class="bar j1" x="470" y="212" width="100" height="24" />
  <text class="label" x="520" y="228">J1-3</text>

  <rect class="makespan" x="40" y="286" width="680" height="30" />
  <text class="ms-title" x="58" y="306">Makespan</text>
  <text class="ms-text" x="142" y="306">the last operation finishes at time 11</text>
</svg>
