<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" role="img" aria-label="Job assignment problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --stroke: rgba(74, 64, 54, 0.22);
      --panel: rgba(244, 239, 232, 0.82);
      --accent: #146356;
      --cell: rgba(20, 99, 86, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --stroke: rgba(255, 255, 255, 0.16);
        --panel: rgba(36, 35, 33, 0.88);
        --accent: #4fd2b5;
        --cell: rgba(79, 210, 181, 0.12);
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .board {
      fill: var(--panel);
      stroke: var(--stroke);
      stroke-width: 1.4;
      rx: 16;
    }

    .grid {
      stroke: var(--stroke);
      stroke-width: 1;
    }

    .head {
      font-size: 15px;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
    }

    .task {
      font-size: 15px;
      font-weight: 700;
      fill: var(--ink);
    }

    .cost {
      font-size: 14px;
      fill: var(--ink);
      text-anchor: middle;
    }

    .note {
      font-size: 12px;
      fill: var(--muted);
    }

    .cap {
      fill: var(--cell);
      stroke: var(--accent);
      stroke-width: 1.3;
      rx: 12;
    }
  </style>

  <text class="meta" x="40" y="28">
    Job assignment instance
    <tspan class="secondary"> · one worker per task · each worker may take at most one task</tspan>
  </text>

  <rect class="board" x="40" y="58" width="680" height="200" />

  <text class="head" x="250" y="96">alice</text>
  <text class="head" x="390" y="96">bob</text>
  <text class="head" x="530" y="96">carol</text>

  <text class="task" x="98" y="144">t1</text>
  <text class="task" x="98" y="186">t2</text>
  <text class="task" x="98" y="228">t3</text>

  <line class="grid" x1="180" y1="112" x2="600" y2="112" />
  <line class="grid" x1="180" y1="154" x2="600" y2="154" />
  <line class="grid" x1="180" y1="196" x2="600" y2="196" />
  <line class="grid" x1="180" y1="238" x2="600" y2="238" />
  <line class="grid" x1="180" y1="112" x2="180" y2="238" />
  <line class="grid" x1="320" y1="112" x2="320" y2="238" />
  <line class="grid" x1="460" y1="112" x2="460" y2="238" />
  <line class="grid" x1="600" y1="112" x2="600" y2="238" />

  <text class="cost" x="250" y="139">5</text>
  <text class="cost" x="390" y="139">1</text>
  <text class="cost" x="530" y="139">3</text>

  <text class="cost" x="250" y="181">2</text>
  <text class="cost" x="390" y="181">6</text>
  <text class="cost" x="530" y="181">1</text>

  <text class="cost" x="250" y="223">4</text>
  <text class="cost" x="390" y="223">3</text>
  <text class="cost" x="530" y="223">2</text>

  <rect class="cap" x="40" y="274" width="680" height="30" />
  <text class="note" x="58" y="293">Capacity rule: no worker can appear in more than one task assignment.</text>
</svg>
