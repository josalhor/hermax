<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" role="img" aria-label="Maximum clique problem graph">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --edge: rgba(74, 64, 54, 0.34);
      --node-fill: rgba(244, 239, 232, 0.88);
      --node-stroke: rgba(74, 64, 54, 0.28);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --edge: rgba(255, 255, 255, 0.22);
        --node-fill: rgba(36, 35, 33, 0.92);
        --node-stroke: rgba(255, 255, 255, 0.18);
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .edge {
      stroke: var(--edge);
      stroke-width: 4;
      fill: none;
    }

    .node {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 2;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <text class="meta" x="40" y="28">
    Maximum clique instance
    <tspan class="secondary"> · pick the largest fully connected vertex set</tspan>
  </text>

  <line class="edge" x1="150" y1="90" x2="300" y2="70" />
  <line class="edge" x1="150" y1="90" x2="250" y2="200" />
  <line class="edge" x1="150" y1="90" x2="430" y2="160" />
  <line class="edge" x1="300" y1="70" x2="250" y2="200" />
  <line class="edge" x1="300" y1="70" x2="430" y2="160" />
  <line class="edge" x1="250" y1="200" x2="430" y2="160" />
  <line class="edge" x1="430" y1="160" x2="560" y2="90" />
  <line class="edge" x1="430" y1="160" x2="590" y2="230" />
  <line class="edge" x1="560" y1="90" x2="590" y2="230" />

  <circle class="node" cx="150" cy="90" r="28" />
  <text class="label" x="150" y="91">0</text>

  <circle class="node" cx="300" cy="70" r="28" />
  <text class="label" x="300" y="71">1</text>

  <circle class="node" cx="250" cy="200" r="28" />
  <text class="label" x="250" y="201">2</text>

  <circle class="node" cx="430" cy="160" r="28" />
  <text class="label" x="430" y="161">3</text>

  <circle class="node" cx="560" cy="90" r="28" />
  <text class="label" x="560" y="91">4</text>

  <circle class="node" cx="590" cy="230" r="28" />
  <text class="label" x="590" y="231">5</text>
</svg>
