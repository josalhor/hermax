<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 350" role="img" aria-label="WiFi channel assignment problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --edge: rgba(74, 64, 54, 0.34);
      --node-fill: rgba(244, 239, 232, 0.88);
      --node-stroke: rgba(74, 64, 54, 0.28);
      --chip: rgba(20, 99, 86, 0.12);
      --chip-stroke: #146356;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --edge: rgba(255, 255, 255, 0.22);
        --node-fill: rgba(36, 35, 33, 0.92);
        --node-stroke: rgba(255, 255, 255, 0.18);
        --chip: rgba(79, 210, 181, 0.14);
        --chip-stroke: #4fd2b5;
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .edge {
      stroke: var(--edge);
      stroke-width: 5;
      fill: none;
    }

    .node {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 2;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .hint {
      font-size: 12px;
      fill: var(--muted);
      text-anchor: middle;
    }

    .chip {
      fill: var(--chip);
      stroke: var(--chip-stroke);
      stroke-width: 1.3;
      rx: 12;
    }

    .chip-text {
      font-size: 12px;
      fill: var(--ink);
    }
  </style>

  <text class="meta" x="40" y="28">
    WiFi channel assignment instance
    <tspan class="secondary"> · adjacent routers may not share a frequency</tspan>
  </text>

  <line class="edge" x1="170" y1="120" x2="380" y2="95" />
  <line class="edge" x1="380" y1="95" x2="590" y2="120" />
  <line class="edge" x1="590" y1="120" x2="380" y2="235" />
  <line class="edge" x1="170" y1="120" x2="380" y2="235" />

  <circle class="node" cx="170" cy="120" r="34" />
  <text class="label" x="170" y="121">0</text>
  <text class="hint" x="170" y="166">router 0</text>

  <circle class="node" cx="380" cy="95" r="34" />
  <text class="label" x="380" y="96">1</text>
  <text class="hint" x="380" y="42">router 1</text>

  <circle class="node" cx="590" cy="120" r="34" />
  <text class="label" x="590" y="121">2</text>
  <text class="hint" x="590" y="166">router 2</text>

  <circle class="node" cx="380" cy="235" r="34" />
  <text class="label" x="380" y="236">3</text>
  <text class="hint" x="380" y="282">router 3</text>

  <rect class="chip" x="40" y="304" width="680" height="30" />
  <text class="chip-text" x="58" y="323">Available states: f1 (cost 1), f2 (cost 2), f3 (cost 1), or offline (penalty 5).</text>
</svg>
