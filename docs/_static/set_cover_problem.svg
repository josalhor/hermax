<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Set cover problem data">
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6c655c;
      --stroke: rgba(74, 64, 54, 0.22);
      --panel: rgba(244, 239, 232, 0.82);
      --accent: #146356;
      --dot: rgba(20, 99, 86, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f4efe6;
        --muted: #cbbca8;
        --stroke: rgba(255, 255, 255, 0.16);
        --panel: rgba(36, 35, 33, 0.88);
        --accent: #4fd2b5;
        --dot: rgba(79, 210, 181, 0.20);
      }
    }

    text {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }

    .meta {
      font-size: 13px;
      font-weight: 600;
      fill: var(--ink);
    }

    .secondary {
      fill: var(--muted);
      font-weight: 400;
    }

    .chip {
      fill: var(--panel);
      stroke: var(--stroke);
      stroke-width: 1.4;
      rx: 14;
    }

    .head {
      font-size: 15px;
      font-weight: 700;
      fill: var(--ink);
    }

    .sub {
      font-size: 12px;
      fill: var(--muted);
    }

    .grid {
      stroke: var(--stroke);
      stroke-width: 1;
    }

    .dot {
      fill: var(--dot);
      stroke: var(--accent);
      stroke-width: 1.2;
    }
  </style>

  <text class="meta" x="40" y="28">
    Set cover instance
    <tspan class="secondary"> · cover every universe element using a minimum-cost set family</tspan>
  </text>

  <rect class="chip" x="40" y="58" width="680" height="220" />

  <text class="head" x="190" y="105" text-anchor="middle">S1</text>
  <text class="sub" x="190" y="126" text-anchor="middle">cost 3</text>
  <text class="head" x="330" y="105" text-anchor="middle">S2</text>
  <text class="sub" x="330" y="126" text-anchor="middle">cost 2</text>
  <text class="head" x="470" y="105" text-anchor="middle">S3</text>
  <text class="sub" x="470" y="126" text-anchor="middle">cost 3</text>
  <text class="head" x="610" y="105" text-anchor="middle">S4</text>
  <text class="sub" x="610" y="126" text-anchor="middle">cost 2</text>

  <text class="head" x="92" y="168">u1</text>
  <text class="head" x="92" y="198">u2</text>
  <text class="head" x="92" y="228">u3</text>
  <text class="head" x="92" y="258">u4</text>

  <line class="grid" x1="150" y1="145" x2="620" y2="145" />
  <line class="grid" x1="150" y1="175" x2="620" y2="175" />
  <line class="grid" x1="150" y1="205" x2="620" y2="205" />
  <line class="grid" x1="150" y1="235" x2="620" y2="235" />
  <line class="grid" x1="150" y1="265" x2="620" y2="265" />

  <line class="grid" x1="190" y1="145" x2="190" y2="265" />
  <line class="grid" x1="330" y1="145" x2="330" y2="265" />
  <line class="grid" x1="470" y1="145" x2="470" y2="265" />
  <line class="grid" x1="610" y1="145" x2="610" y2="265" />

  <circle class="dot" cx="190" cy="160" r="8" />
  <circle class="dot" cx="190" cy="190" r="8" />

  <circle class="dot" cx="330" cy="190" r="8" />
  <circle class="dot" cx="330" cy="220" r="8" />

  <circle class="dot" cx="470" cy="220" r="8" />
  <circle class="dot" cx="470" cy="250" r="8" />

  <circle class="dot" cx="610" cy="160" r="8" />
  <circle class="dot" cx="610" cy="250" r="8" />
</svg>
